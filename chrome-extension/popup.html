<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Big Mitch</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <div class="brain-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96.44 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 1.98-3A2.5 2.5 0 0 1 9.5 2Z"/>
            <path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96.44 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-1.98-3A2.5 2.5 0 0 0 14.5 2Z"/>
          </svg>
        </div>
        <div class="header-text">
          <h1>BIG MITCH</h1>
          <span class="subtitle">ML Signal Filter</span>
        </div>
      </div>
      <div class="status-indicator" id="statusIndicator">
        <span class="status-dot"></span>
        <span class="status-text">Connecting...</span>
      </div>
    </header>

    <!-- Positions Panel (collapsible) -->
    <div class="positions-panel" id="positionsPanel">
      <div class="panel-header" onclick="togglePositions()">
        <span>Open Positions</span>
        <span class="position-count" id="positionCount">0</span>
        <svg class="chevron" id="positionsChevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="6 9 12 15 18 9"></polyline>
        </svg>
      </div>
      <div class="positions-content" id="positionsContent">
        <div class="positions-list" id="positionsList">
          <div class="no-positions">No open positions</div>
        </div>
      </div>
    </div>

    <!-- Stats Bar -->
    <div class="stats-bar" id="statsBar">
      <div class="stat">
        <span class="stat-label">Win Rate</span>
        <span class="stat-value" id="winRate">--</span>
      </div>
      <div class="stat">
        <span class="stat-label">Today</span>
        <span class="stat-value" id="tradesToday">0</span>
      </div>
      <div class="stat">
        <span class="stat-label">Streak</span>
        <span class="stat-value" id="streak">0</span>
      </div>
    </div>

    <!-- Chat Container -->
    <div class="chat-container">
      <div class="messages" id="messages">
        <div class="message mitch">
          <div class="message-avatar">M</div>
          <div class="message-content">
            <p>What's happening on the chart? Tell me what you're seeing and I'll give you my read.</p>
          </div>
        </div>
      </div>

      <!-- Input Area -->
      <div class="input-area">
        <textarea
          id="messageInput"
          placeholder="e.g., We're up 40 on MNQ, seeing rejection candles..."
          rows="2"
        ></textarea>
        <button id="sendButton" onclick="sendMessage()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </div>

    <!-- Quick Actions -->
    <div class="quick-actions">
      <button class="quick-btn" onclick="quickMessage('What\'s my current position status?')">Position Status</button>
      <button class="quick-btn" onclick="quickMessage('Should I trail my stop here?')">Trail Stop?</button>
      <button class="quick-btn" onclick="quickMessage('How\'s the setup looking overall?')">Setup Quality</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
